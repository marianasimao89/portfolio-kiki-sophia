<!doctype html>
<html lang="en">
  <head>

  <body>

      <header>
        <a href="index.html" class="logo-link">
          <img src="images/logo.png" class="logo" alt="Kiki Sophia logo" />
        </a>
      </header>

      <main class="work-layout">
        <nav class="side-menu">
          <a href="work.html">work</a>
          <a href="shop.html">shop</a>
          <a href="about.html">about</a>
        </nav>

        <section class="gallery">
          <figure class="artwork artwork-1">
            <img src="images/work-1.jpeg" alt="Sorry Not Sorry" />
            <figcaption>

              <span>acrylic and pencil on canvas</span>
              <span>58 × 82 cm</span>

          <figure class="artwork artwork-2">
            <img src="images/work-2.jpeg" alt="Mars In Scorpio II" />
